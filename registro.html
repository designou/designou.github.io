<!DOCTYPE html>

<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro Freelancer | Terceiriza Group</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="box">

<h2>Cadastro Freelancer</h2>

<p class="sub">
Preencha o formulário para trabalhar com a Terceiriza Group
</p>

<form id="f">

<input type="text" id="n" placeholder="Nome completo" required>

<input type="text" id="c" placeholder="CPF" required>

<input type="number" id="i" placeholder="Idade" required>

<input type="text" id="r" placeholder="Região (Campinas, Sumaré...)" required>

<input type="text" id="w" placeholder="Número do WhatsApp" required>

<textarea id="a" placeholder="Área que deseja atuar (ex: limpeza, produção, carga e descarga)" required></textarea>

<input type="text" id="website" style="display:none">

<button type="submit">
Enviar cadastro
</button>

</form>

<p id="msg"></p>

</div>

<script src="script.js"></script>

</body>
</html>
